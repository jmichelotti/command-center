# Command Center — Space Configuration
# See CLAUDE.md for schema documentation

# ── Bot type definitions ──────────────────────────────────
# Registered separately so multiple zones can share a bot style.
# Adding a new bot type = add entry here + optionally drop a PNG in assets/sprites/
botTypes:
  droid:
    label: "Astromech Droid"
    sprite: null
    placeholder:
      shape: circle
      size: 1.5  # percentage of image width
    colors:
      active: "#00ff88"
      idle: "#4a6fa5"
      error: "#ff4444"

  protocol-droid:
    label: "Protocol Droid"
    sprite: null
    placeholder:
      shape: circle
      size: 1.5
    colors:
      active: "#ffaa00"
      idle: "#4a6fa5"
      error: "#ff4444"

# ── Data source definitions ───────────────────────────────
# Each has a `type` that maps to a backend adapter.
# Adding a new instance of an existing type = config only.
# Adding a new type = write a small adapter (fetch + derive state + extract panel fields).
dataSources:
  storygraph:
    type: storygraph
    endpoint: "http://127.0.0.1:1200/status"
    pollInterval: 30

  jellyfin:
    type: jellyfin
    endpoint: "http://127.0.0.1:1201/status"
    pollInterval: 15

# ── Spaces ────────────────────────────────────────────────
# Each space is a background image with zones mapped onto it.
# All polygon coordinates are [x%, y%] relative to image dimensions.
spaces:
  - id: jabbas-palace
    name: "Jabba's Palace"
    image: "backgrounds/jabbas-palace.jpg"
    nativeWidth: 3900
    nativeHeight: 7500
    zones:
      - id: storygraph
        name: "StoryGraphAutomation"
        polygon:
          - [10.6, 6.6]
          - [10.5, 25.9]
          - [34.5, 26.0]
          - [34.8, 6.8]
        bot: droid
        dataSource: storygraph

      - id: jellyfin
        name: "ThunderheadFlix"
        polygon:
          - [73.1, 2.3]
          - [73.0, 17.1]
          - [91.0, 17.1]
          - [91.3, 2.1]
        bot: protocol-droid
        dataSource: jellyfin
